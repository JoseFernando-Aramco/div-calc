<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;max-width:480px;margin:0 auto;min-height:100vh}

/* 헤더 */
.hdr{background:#fff;padding:24px 20px 16px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hdr-top-left{font-size:13px;color:#888;font-weight:500}
.hdr-actions{display:flex;gap:14px;align-items:center}
.hdr-icon{font-size:20px;cursor:pointer;color:#555}
.hdr-total{font-size:32px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.hdr-pnl{font-size:14px;font-weight:500;margin-bottom:16px}
.pos{color:#2563eb}.neg{color:#dc2626}

/* 아이콘 메뉴 */
.icon-menu{display:flex;border-top:1px solid #f2f2f7;margin:0 -20px;padding:12px 20px 0}
.icon-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 0}
.icon-circle{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px}
.icon-lbl{font-size:11px;color:#888}
.icon-item.on .icon-lbl{color:#2563eb;font-weight:600}

/* 투자 섹션 */
.section{background:#fff;margin-top:10px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px}
.section-title{font-size:17px;font-weight:700}
.sort-row{display:flex;gap:0;padding:0 20px 10px;align-items:center}
.sort-tab{font-size:13px;color:#aaa;padding:5px 10px;cursor:pointer;border-radius:6px}
.sort-tab.on{color:#1c1c1e;font-weight:600;background:#f2f2f7}
.sort-div{width:1px;height:12px;background:#e0e0e0;margin:0 2px}
.sort-right{margin-left:auto;display:flex;gap:6px}
.sort-btn{font-size:12px;color:#aaa;padding:4px 10px;border-radius:12px;cursor:pointer;border:1px solid #e8e8e8;background:#fff}
.sort-btn.on{color:#2563eb;border-color:#2563eb;font-weight:600}

/* 종목 행 */
.stock-list{padding:0 20px}
.stock-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f2f2f7;position:relative;cursor:pointer}
.stock-row:last-child{border-bottom:none}
.stock-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.stock-info{flex:1;min-width:0}
.stock-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.stock-sub{font-size:12px;color:#888}
.stock-right{text-align:right;flex-shrink:0}
.stock-val{font-size:14px;font-weight:700;margin-bottom:2px}
.stock-pnl{font-size:12px;font-weight:500}
.stock-loading{font-size:12px;color:#2563eb}

/* 배당 호버 오버레이 */
.div-overlay{display:none;position:absolute;left:0;right:0;top:0;bottom:0;background:rgba(255,255,255,.97);border-radius:10px;padding:10px 12px;z-index:10;border:1px solid #fde68a;margin:-2px}
.stock-row:hover .div-overlay,.stock-row.show-ov .div-overlay{display:block}
.ov-head{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#92400e;margin-bottom:6px}
.ov-close{cursor:pointer;color:#aaa;padding:0 2px;font-size:14px}
.ov-item{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #f5f5f5;color:#555}
.ov-item:last-child{border:none}
.ov-total{font-size:11px;color:#d97706;font-weight:700;margin-bottom:5px}
.ov-fetch{text-align:center;padding:10px 0}
.ov-fetch button{padding:6px 14px;border-radius:7px;border:1px solid #fde68a;background:#fffbeb;font-size:11px;color:#92400e;cursor:pointer}

/* 추가 버튼 */
.add-row{padding:14px 20px}
.add-btn{width:100%;padding:13px;border-radius:12px;border:1.5px dashed #c7d2fe;background:#eef2ff;color:#4f46e5;font-size:14px;font-weight:600;cursor:pointer}

/* 차트/시뮬 */
.chart-wrap{padding:16px 20px}
.ccard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px}
.cttl{font-size:13px;color:#888;margin-bottom:10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.scard{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #f0f0f0}
.slbl{font-size:11px;color:#aaa;margin-bottom:3px}
.sval{font-size:17px;font-weight:700}
.sbg{background:#f0f0f0;border-radius:4px;height:5px;margin-top:4px}
.sbar{height:5px;border-radius:4px}
.mbars{display:flex;align-items:flex-end;gap:3px;height:72px;margin-bottom:6px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mbar{width:100%;border-radius:2px 2px 0 0}
.mlbl{font-size:8px;color:#aaa}
.mpills{display:flex;flex-wrap:wrap;gap:5px}
.mpill{font-size:11px;padding:3px 8px;border-radius:6px}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ldot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.lnm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lpc{font-weight:600;font-size:13px;min-width:38px;text-align:right}
.lvl{font-size:12px;color:#888;min-width:58px;text-align:right}

/* 빈 상태 */
.empty{text-align:center;padding:48px 0;color:#aaa}

/* 스피너 */
.spin{display:inline-block;width:10px;height:10px;border:2px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:3px}
@keyframes sp{to{transform:rotate(360deg)}}

/* 글로벌 로딩 */
#gld{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#gld .gs{width:36px;height:36px;border-radius:50%;border:3px solid #c7d2fe;border-top-color:#4f46e5;animation:sp .75s linear infinite}

/* 모달 */
.ov-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov-modal.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 44px;width:100%;max-width:480px;max-height:93vh;overflow-y:auto}
.mt{font-weight:700;font-size:17px;margin-bottom:16px}
.fl{font-size:12px;color:#888;margin-bottom:4px}
.fg{margin-bottom:12px}
.iw{display:flex;align-items:center;background:#f9f9f9;border:1.5px solid #e8e8e8;border-radius:10px}
.iw:focus-within{border-color:#4f46e5}
.inp{flex:1;padding:11px 12px;border:none;background:transparent;font-size:14px;outline:none;min-width:0;color:#1c1c1e}
.suf{padding-right:10px;font-size:12px;color:#aaa}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
.hint{background:#eef2ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#4f46e5;margin-bottom:14px;line-height:1.5}
.mbtns{display:flex;gap:10px}
.bcn{flex:1;padding:13px;border-radius:10px;border:1px solid #e8e8e8;background:#f9f9f9;font-size:14px;cursor:pointer}
.bsb{flex:2;padding:13px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.srch-dd{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e8e8e8;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200;max-height:220px;overflow-y:auto;margin-top:3px}
.srch-dd.show{display:block}
.ddi{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5}
.ddi:last-child{border:none}
.ddi:active{background:#f9f9f9}
.din{font-size:13px;font-weight:600}
.dis{font-size:11px;color:#aaa;margin-top:1px}

/* 업데이트 바 */
.upd-bar{background:#eef2ff;padding:6px 20px;font-size:11px;color:#4f46e5;display:flex;justify-content:space-between;align-items:center}
</style>
</head>

<div id="gld">
  <div class="gs"></div>
  <div id="gmsg" style="font-size:13px;color:#4f46e5;font-weight:500;text-align:center;max-width:260px;line-height:1.5"></div>

</div>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-top">

    <div class="hdr-actions">
      <span class="hdr-icon" onclick="refreshAll()" id="rfIcon" title="전체 업데이트">↻</span>
      <span class="hdr-icon" onclick="openAdd()">+</span>
    </div>
  </div>
  <div class="hdr-total" id="hTotal">0원</div>
  <div class="hdr-pnl" id="hPnl"></div>
  <div id="hDiv" style="font-size:13px;color:#d97706;margin-bottom:4px;display:none"></div>

  <div class="icon-menu">
    <div class="icon-item on" id="iList" onclick="goTab('list')">
      <div class="icon-circle" style="background:#eef2ff"><span style="font-size:18px">📊</span></div>
      <span class="icon-lbl">보유</span>
    </div>
    <div class="icon-item" id="iSim" onclick="goTab('sim')">
      <div class="icon-circle" style="background:#fffbeb"><span style="font-size:18px">🪙</span></div>
      <span class="icon-lbl">배당</span>
    </div>
    <div class="icon-item" id="iChart" onclick="goTab('chart')">
      <div class="icon-circle" style="background:#f0fdf4"><span style="font-size:18px">📈</span></div>
      <span class="icon-lbl">비중</span>
    </div>
  </div>
</div>

<div id="hUpd" class="upd-bar" style="display:none"></div>

<!-- 보유종목 -->
<div id="pList">

    </div>
    <div class="sort-row">

      <div class="sort-right">

        <div class="sort-btn" id="fDiv" onclick="setFlt('div')">배당주</div>
        <div class="sort-btn" id="fNorm" onclick="setFlt('normal')">일반</div>
      </div>
    </div>
    <div class="stock-list" id="hList"></div>
    <div class="empty" id="eEmpty">

    </div>
    <div class="add-row">
      <button class="add-btn" onclick="openAdd()">+ 종목 추가</button>

  </div>
</div>

<div id="pSim" style="display:none">

</div>

<!-- 비중 차트 -->
<div id="pChart" style="display:none">

  </div>
</div>

<!-- 추가 모달 -->
<div class="ov-modal" id="addOv" onclick="if(event.target===this)this.classList.remove('show')">
<div class="modal" onclick="event.stopPropagation()">
  <div class="mt">종목 추가</div>
  <div class="fg" style="position:relative">
    <div class="fl">종목명</div>
    <div class="iw"><input class="inp" id="aName" placeholder="삼성전자, JEPQ, KODEX…" autocomplete="off" oninput="doSrch(this.value)"></div>
    <div class="srch-dd" id="srchDD"></div>
  </div>
  <div class="fr">
    <div class="fg"><div class="fl">평균 매수가 *</div><div class="iw"><input class="inp" id="aAvg" type="number" inputmode="numeric" placeholder="50000"><span class="suf">원</span></div></div>
    <div class="fg"><div class="fl">수량 *</div><div class="iw"><input class="inp" id="aQty" type="number" inputmode="numeric" placeholder="100"><span class="suf">주</span></div></div>
  </div>
  <div class="fr">
    <div class="fg"><div class="fl">연 배당수익률</div><div class="iw"><input class="inp" id="aDy" type="number" inputmode="decimal" placeholder="12.5"><span class="suf">%</span></div></div>
    <div class="fg"><div class="fl">배당 주기</div><div class="iw"><select class="inp" id="aDf" style="-webkit-appearance:auto;appearance:auto"><option>없음</option><option>월배당</option><option>분기배당</option><option>반기배당</option><option>연배당</option></select></div></div>
  </div>
  <div class="hint">추가 즉시 실시간 가격을 자동 조회합니다.</div>
  <div class="mbtns">
    <button class="bcn" onclick="document.getElementById('addOv').classList.remove('show')">취소</button>
    <button class="bsb" onclick="addHolding()">추가하기</button>
  </div>
</div>
</div>

<!-- 추가매수 모달 -->

<div class="modal" onclick="event.stopPropagation()">

  <div class="fr">

  </div>
  <div id="buyPrev" style="background:#eef2ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#4f46e5;margin-bottom:14px;display:none"></div>
  <div class="mbtns">
    <button class="bcn" onclick="document.getElementById('buyOv').classList.remove('show')">취소</button>
    <button class="bsb" onclick="confirmBuy()">매수 반영</button>
  </div>
</div>
</div>

function save(){localStorage.setItem('pf6',JSON.stringify(D))}
let D=load(),TAB='list',FLT='all',SORT='val',LDS=new Set(),LDALL=false,PIE=null,BUY_ID=null;

function fmt(n){n=Math.round(n||0);const a=Math.abs(n),s=n<0?'-':'';if(a>=100000000)return s+(a/100000000).toFixed(1)+'억원';if(a>=10000)return s+Math.round(a/10000)+'만원';return n.toLocaleString()+'원'}
function fN(n){return Math.round(n||0).toLocaleString()}
function dvN(df){return df==='월배당'?12:df==='분기배당'?4:df==='반기배당'?2:1}
function toSym(n){const db=DB.find(x=>x.n===n||x.s===n||x.s.toUpperCase()===n.toUpperCase());return db?db.s:(n.match(/^\d{6}$/)?n+'.KS':n.toUpperCase())}
function isKR(s){return s&&(s.endsWith('.KS')||s.endsWith('.KQ'))}
function initials(n){return n.replace(/[가-힣a-zA-Z]/g,m=>m).slice(0,2).toUpperCase()||n.slice(0,2).toUpperCase()}

/* ── API ── */
const PROXIES=[u=>'https://corsproxy.io/?'+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];

async function yahooQuote(sym){
  for(const srv of['query1','query2']){
    for(const mkP of PROXIES){
      try{
        const r=await fetch(mkP(`https://${srv}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`));
        if(!r.ok)continue;
        const txt=await r.text();
        const j=JSON.parse(txt.startsWith('{"contents"')?JSON.parse(txt).contents:txt);
        const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if(p&&p>0)return p;
      }catch{}
    }
  }
  throw new Error('yahoo fail');
}
async function fhQuote(sym){
  const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FKEY}`);
  if(!r.ok)throw new Error('fh '+r.status);
  const j=await r.json();if(!j.c||j.c<=0)throw new Error('no price');return j.c;
}
async function fetchRate(){
  try{const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');const j=await r.json();if(j?.rates?.KRW>100)D.rate=Math.round(j.rates.KRW);}catch{}
}
async function yahooDiv(sym){
  const now=Math.floor(Date.now()/1000),p1=now-400*24*3600;
  for(const srv of['query1','query2']){
    for(const mkP of PROXIES){
      try{
        const r=await fetch(mkP(`https://${srv}.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?period1=${p1}&period2=${now}&interval=1d&events=div`));
        if(!r.ok)continue;
        const txt=await r.text();
        const lines=txt.trim().split('\n').slice(1).filter(l=>l&&!l.startsWith('Date'));
        if(!lines.length)continue;
        const rows=lines.map(l=>{const[d,a]=l.split(',');return{date:d.trim(),amount:parseFloat(a)||0};}).filter(r=>r.amount>0).sort((a,b)=>b.date.localeCompare(a.date));
        if(rows.length)return rows;
      }catch{}
    }
  }
  /* chart API 폴백 */
  for(const srv of['query1','query2']){
    for(const mkP of PROXIES){
      try{
        const r=await fetch(mkP(`https://${srv}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2y&events=div`));
        if(!r.ok)continue;
        const txt=await r.text();
        const j=JSON.parse(txt.startsWith('{"contents"')?JSON.parse(txt).contents:txt);
        const ev=j?.chart?.result?.[0]?.events?.dividends;
        if(!ev)continue;
        const cut=now-400*24*3600;
        const rows=Object.values(ev).filter(d=>d.date>cut).map(d=>({date:new Date(d.date*1000).toISOString().split('T')[0],amount:parseFloat(d.amount.toFixed(4))})).sort((a,b)=>b.date.localeCompare(a.date));
        if(rows.length)return rows;
      }catch{}
    }
  }
  return[];
}

async function fetchOne(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);render();
  try{
    const sym=h.sym||toSym(h.n);
    let p=isKR(sym)?Math.round(await yahooQuote(sym)):Math.round((await fhQuote(sym))*D.rate);
    D.h=D.h.map(x=>x.id===id?{...x,cur:p,sym,err:0}:x);
    D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    save();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,err:1}:x);}
  LDS.delete(id);render();
}
async function fetchDivs(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);render();
  try{
    const sym=h.sym||toSym(h.n);
    const divs=await yahooDiv(sym);
    D.h=D.h.map(x=>x.id===id?{...x,divHistory:divs}:x);
    save();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,divHistory:[]}:x);}
  LDS.delete(id);render();
}
async function refreshAll(){
  if(LDALL||!D.h.length)return;
  LDALL=true;setRfIcon(true);showG('환율 조회 중...');
  await fetchRate();
  for(let i=0;i<D.h.length;i++){
    const h=D.h[i];setGMsg(`[${i+1}/${D.h.length}] ${h.n} 조회 중...`);
    LDS.add(h.id);
    try{
      const sym=h.sym||toSym(h.n);
      let p=isKR(sym)?Math.round(await yahooQuote(sym)):Math.round((await fhQuote(sym))*D.rate);
      D.h=D.h.map(x=>x.id===h.id?{...x,cur:p,sym,err:0}:x);
    }catch{D.h=D.h.map(x=>x.id===h.id?{...x,err:1}:x);}
    LDS.delete(h.id);
  }
  D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  save();hideG();setRfIcon(false);LDALL=false;render();
}

  const mDiv=dvH.reduce((s,h)=>{const a=(h.cur||h.avg)*h.qty*h.dy/100;return s+a/dvN(h.df);},0);

  document.getElementById('hTotal').textContent=fmt(tV);
  const pe=document.getElementById('hPnl');
  pe.textContent=H.length?`${pnl>=0?'+':''}${fmt(pnl)} (${pct>=0?'+':''}${pct.toFixed(2)}%) 총 수익`:'';

  const de=document.getElementById('hDiv');
  if(mDiv>0){de.style.display='block';de.textContent=`🪙 월 예상 배당 ${fmt(mDiv)}`;}else de.style.display='none';

  let fil=H.filter(h=>FLT==='all'?true:FLT==='div'?(h.isDv&&h.dy>0):(!h.isDv||!h.dy));
  if(SORT==='val')fil=[...fil].sort((a,b)=>(b.cur||b.avg)*b.qty-(a.cur||a.avg)*a.qty);
  else fil=[...fil].sort((a,b)=>{const pa=(b.cur||b.avg)-b.avgCost,pb=(a.cur||a.avg)-a.avgCost;return pa*b.qty-pb*a.qty;});

  document.getElementById('hList').innerHTML=fil.map((h,ri)=>{
    const gi=H.indexOf(h);
    const cur=h.cur||h.avg,val=cur*h.qty;
    const pp=(cur-h.avgCost)*h.qty,pp2=(cur-h.avgCost)/h.avgCost*100;
    const isLd=LDS.has(h.id);
    const usd=h.sym&&!isKR(h.sym)&&h.cur?` ($${(h.cur/D.rate).toFixed(2)})`:'';

    if(h.isDv){
      if(h.divHistory===undefined||h.divHistory===null){
        ovInner=`<div class="ov-head"><span>🪙 직전 12개월 배당</span><span class="ov-close" onclick="toggleOv(event,${h.id})">✕</span></div><div class="ov-fetch"><button onclick="event.stopPropagation();fetchDivs(${h.id})">배당 내역 조회</button></div>`;
      }else if(!h.divHistory.length){
        ovInner=`<div class="ov-head"><span>🪙 직전 12개월 배당</span><span class="ov-close" onclick="toggleOv(event,${h.id})">✕</span></div><div style="font-size:11px;color:#aaa;text-align:center;padding:8px 0">조회된 배당 내역 없음</div>`;
      }else{
        const tot=h.divHistory.reduce((s,d)=>s+(d.amount||0),0);
        const totKRW=isKR(h.sym||'')?Math.round(tot):Math.round(tot*D.rate);
        ovInner=`<div class="ov-head"><span>🪙 직전 12개월 배당</span><span class="ov-close" onclick="toggleOv(event,${h.id})">✕</span></div>
<div class="ov-total">주당 합계 ${isKR(h.sym||'')?fN(Math.round(tot))+'원':('$'+tot.toFixed(4))} · 총 ${fmt(totKRW*h.qty)}</div>
${h.divHistory.slice(0,12).map(d=>`<div class="ov-item"><span>${d.date}</span><span style="font-weight:600">${isKR(h.sym||'')?fN(Math.round(d.amount))+'원 · 총 '+fmt(Math.round(d.amount)*h.qty):'$'+d.amount.toFixed(4)+' · '+fmt(Math.round(d.amount*D.rate)*h.qty)}</span></div>`).join('')}`;

</div>`;
  }).join('');

  if(TAB==='sim')renderSim(dvH,tV);

function renderSim(dvH,tV){
  const sc=document.getElementById('simCont');
  if(!dvH.length){sc.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">🪙</div><div>배당주를 추가하면 시뮬레이션이 표시됩니다</div></div>';return;}
  const ss=dvH.map((h,idx)=>{const val=(h.cur||h.avg)*h.qty,ann=val*h.dy/100;return{...h,val,ann,mon:ann/12,pp:ann/dvN(h.df),idx};});
  const tM=ss.reduce((s,x)=>s+x.mon,0),tA=ss.reduce((s,x)=>s+x.ann,0),tD=ss.reduce((s,x)=>s+x.val,0);
  const aY=tD>0?tA/tD*100:0,mxM=Math.max(...ss.map(x=>x.mon),1);
  const md=Array(12).fill(0).map(()=>({t:0}));
  ss.forEach(x=>{
    const a=m=>{md[m].t+=x.pp};
    if(x.df==='월배당'){for(let m=0;m<12;m++)md[m].t+=x.mon;}
    else if(x.df==='분기배당')[2,5,8,11].forEach(a);
    else if(x.df==='반기배당')[5,11].forEach(a);
    else if(x.df==='연배당')a(11);
  });
  const mxB=Math.max(...md.map(m=>m.t),1);
  sc.innerHTML=`
<div class="sgrid">${[['월 예상 배당',fmt(tM),'#d97706'],['연 예상 배당',fmt(tA),'#4f46e5'],['평균 배당수익률',aY.toFixed(2)+'%','#16a34a'],['배당주 평가금액',fmt(tD),'#0891b2']].map(([l,v,c])=>`<div class="scard"><div class="slbl">${l}</div><div class="sval" style="color:${c}">${v}</div></div>`).join('')}</div>
<div class="ccard"><div class="cttl">종목별 월 배당 수입</div>${ss.map(x=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div><span style="font-size:13px;font-weight:700">${x.n}</span><span style="font-size:10px;background:${BG[x.idx%BG.length]};color:${COLORS[x.idx%COLORS.length]};padding:1px 6px;border-radius:6px;margin-left:5px">${x.df}</span></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#d97706">${fmt(x.mon)}/월</div><div style="font-size:11px;color:#aaa">연 ${fmt(x.ann)} · ${x.dy.toFixed(1)}%</div></div></div><div class="sbg"><div class="sbar" style="width:${x.mon/mxM*100}%;background:${COLORS[x.idx%COLORS.length]}"></div></div></div>`).join('')}</div>
<div class="ccard"><div class="cttl">월별 배당 입금 예상</div><div class="mbars">${md.map((m,i)=>`<div class="mcol"><div class="mbar" style="height:${m.t>0?Math.max(m.t/mxB*60,5):3}px;background:${m.t>0?'#4f46e5':'#e8e8e8'}"></div><div class="mlbl">${i+1}</div></div>`).join('')}</div><div class="mpills">${md.map((m,i)=>`<span class="mpill" style="background:${m.t>0?'#eef2ff':'#f5f5f5'};color:${m.t>0?'#4f46e5':'#bbb'}">${i+1}월 ${m.t>0?fmt(m.t):'—'}</span>`).join('')}</div><div style="font-size:10px;color:#aaa;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">※ 분기배당 3·6·9·12월 / 반기배당 6·12월 기준 추정</div></div>`;
}

function delH(id){
  const h=D.h.find(x=>x.id===id);
  if(h&&!confirm(`${h.n} 삭제할까요?`))return;
  D.h=D.h.filter(x=>x.id!==id);save();render();
}
async function addHolding(){
  const nm=document.getElementById('aName').value.trim();
  const avg=parseFloat(document.getElementById('aAvg').value);
  const qty=parseInt(document.getElementById('aQty').value);
  const dy=parseFloat(document.getElementById('aDy').value)||0;
  const df=document.getElementById('aDf').value;
  if(!nm||!avg||!qty){alert('종목명, 평단가, 수량을 입력해주세요');return;}
  const dbI=DB.find(x=>x.n===nm||x.s===nm.toUpperCase());
  const sym=dbI?dbI.s:toSym(nm);
  const id=Date.now();
  D.h.push({id,n:nm,sym,avg,avgCost:avg,qty,cur:avg,dy,df:dy>0?df:'없음',isDv:dy>0,err:0});
  save();document.getElementById('addOv').classList.remove('show');
  ['aName','aAvg','aQty','aDy'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('aDf').value='없음';
  document.getElementById('srchDD').className='srch-dd';
  render();
  if(!isKR(sym))await fetchRate();
  await fetchOne(id);
}
function openBuy(id){
  BUY_ID=id;
  const h=D.h.find(x=>x.id===id);
  document.getElementById('buyInfo').textContent=`${h.n} · 현재 ${fN(h.qty)}주 · 평단 ${fN(h.avgCost)}원`;
  document.getElementById('bQty').value='';
  document.getElementById('bAvg').value=h.cur||h.avg;
  document.getElementById('buyPrev').style.display='none';
  document.getElementById('buyOv').classList.add('show');
  const upd=()=>{
    const h2=D.h.find(x=>x.id===BUY_ID);if(!h2)return;
    const q=parseInt(document.getElementById('bQty').value)||0;
    const a=parseFloat(document.getElementById('bAvg').value)||0;
    const p=document.getElementById('buyPrev');
    if(q>0&&a>0){const nq=h2.qty+q,na=Math.round((h2.avgCost*h2.qty+a*q)/nq);p.textContent=`매수 후 → ${fN(nq)}주 · 평균단가 ${fN(na)}원`;p.style.display='block';}
    else p.style.display='none';
  };
  document.getElementById('bQty').oninput=upd;
  document.getElementById('bAvg').oninput=upd;
}
function confirmBuy(){
  if(!BUY_ID)return;
  const q=parseInt(document.getElementById('bQty').value)||0;
  const a=parseFloat(document.getElementById('bAvg').value)||0;
  if(!q||!a){alert('수량과 단가를 입력해주세요');return;}
  D.h=D.h.map(h=>{if(h.id!==BUY_ID)return h;const nq=h.qty+q,na=Math.round((h.avgCost*h.qty+a*q)/nq);return{...h,qty:nq,avgCost:na,avg:na};});
  save();document.getElementById('buyOv').classList.remove('show');render();
}

/* ── 검색 자동완성 ── */
function doSrch(q){
  const dd=document.getElementById('srchDD');
  if(!q.trim()){dd.className='srch-dd';return;}
  const m=DB.filter(x=>x.n.includes(q)||x.s.toLowerCase().includes(q.toLowerCase())||x.n.toLowerCase().includes(q.toLowerCase())).slice(0,9);
  if(!m.length){dd.className='srch-dd';return;}
  dd.innerHTML=m.map(x=>`<div class="ddi" onclick="pickSrch('${x.n.replace(/'/g,"\\'")}','${x.s}',${x.dy},'${x.df}')"><div class="din">${x.n}</div><div class="dis">${x.s} · ${x.isDv?`배당 ${x.dy}% · ${x.df}`:'배당없음'}</div></div>`).join('');
  dd.className='srch-dd show';
}
function pickSrch(n,s,dy,df){
  document.getElementById('aName').value=n;
  document.getElementById('aDy').value=dy||'';
  document.getElementById('aDf').value=df||'없음';
  document.getElementById('srchDD').className='srch-dd';
}
document.addEventListener('click',e=>{if(!e.target.closest('#srchDD')&&e.target.id!=='aName')document.getElementById('srchDD').className='srch-dd';});

/* ── 배당 오버레이 ── */
function handleRowClick(e,id,isDv){
  if(!isDv)return;
  if(e.pointerType==='touch'||window.matchMedia('(hover:none)').matches)toggleOv(e,id);
}
function toggleOv(e,id){
  e.stopPropagation();
  const row=document.getElementById('row_'+id);
  if(!row)return;
  row.classList.toggle('show-ov');
  const h=D.h.find(x=>x.id===id);
  if(h&&(h.divHistory===undefined||h.divHistory===null)&&row.classList.contains('show-ov'))fetchDivs(id);
}
document.addEventListener('mouseover',e=>{
  const row=e.target.closest('.stock-row[id]');
  if(!row)return;
  const id=parseInt(row.id.replace('row_',''));
  const h=D.h.find(x=>x.id===id);
  if(h&&h.isDv&&(h.divHistory===undefined||h.divHistory===null))fetchDivs(id);
});

/* ── 로딩 ── */
function openAdd(){document.getElementById('addOv').classList.add('show');}
let _gt=null;
function showG(m){document.getElementById('gld').style.display='flex';setGMsg(m);if(_gt)clearTimeout(_gt);_gt=setTimeout(forceClose,30000);}
function setGMsg(m){document.getElementById('gmsg').textContent=m;}
function hideG(){document.getElementById('gld').style.display='none';if(_gt){clearTimeout(_gt);_gt=null;}}
function forceClose(){hideG();LDALL=false;setRfIcon(false);LDS.clear();render();}
function setRfIcon(b){document.getElementById('rfIcon').style.animation=b?'sp .75s linear infinite':'none';}

render();
</script>
</body>
</html>
